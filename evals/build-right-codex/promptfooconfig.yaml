# yaml-language-server: $schema=https://promptfoo.dev/config-schema.json
description: Build Right native Codex flow evals

prompts:
  - file://prompts/native-step.json

providers:
  - exec:bun providers/native-codex-provider.ts evals/build-right-codex/providers/native-codex-provider.ts

defaultTest:
  options:
    runSerially: true
  assert:
    - type: is-json
    - type: javascript
      value: file://assertions/native-step-result.js

evaluateOptions:
  maxConcurrency: 1
  cache: false
  timeoutMs: 900000

commandLineOptions:
  cache: false
  maxConcurrency: 1
  output:
    - evals/build-right-codex/results/latest.json
    - evals/build-right-codex/results/latest.junit.xml

outputPath:
  - evals/build-right-codex/results/latest.json
  - evals/build-right-codex/results/latest.junit.xml

writeLatestResults: true

tests:
  - description: native smoke preflight step 041
    vars:
      caseId: smoke-preflight-041
      mode: native
      step: "041"
      expectedStatus: pass
      negativeFixture: ""
      expectedFailureIncludes: ""
    metadata:
      suite: native-skill-smoke
      skill: build-right-preflight
      step: "041"
      expectedStatus: pass

